<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Study Admin Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/human-experiment/experiment.css" />
    <link rel="stylesheet" href="/human-experiment/admin.css" />
    <link rel="icon" href="/human-experiment/favicon.svg" type="image/svg+xml" />
  </head>
  <body class="sb-admin-login-page">
    <div class="sb-admin-login-center">
      <p id="sb-login-error" class="sb-admin-login-error" role="alert" hidden></p>
      <a class="sb-admin-google-btn" href="/auth/google">
        <svg class="sb-admin-google-logo" width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path
            fill="#4285F4"
            d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
          />
          <path
            fill="#34A853"
            d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
          />
          <path
            fill="#FBBC05"
            d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"
          />
          <path
            fill="#EA4335"
            d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"
          />
        </svg>
        <span>Continue with Google</span>
      </a>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const errorEl = document.getElementById("sb-login-error");
      const error = params.get("error");
      if (error === "access_denied") {
        errorEl.textContent = "Access denied. Use an allowed Stanford Google account.";
        errorEl.hidden = false;
      } else if (error === "google_signin_failed") {
        errorEl.textContent = "Google sign in failed. Please try again.";
        errorEl.hidden = false;
      }
      if (error) {
        window.history.replaceState({}, document.title, "/admin");
      }
    </script>
  </body>
</html>
